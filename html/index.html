<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worker & Login Page</title>
<style>
    body, html {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: #e6f5e6;
    }

    section {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Add Worker Form */
    .add-worker-form {
        background: #fff;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        width: 320px;
    }

    .add-worker-form input,
    .add-worker-form select {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #b3d9b3;
        border-radius: 5px;
        box-sizing: border-box;
        font-size: 14px;
        background: #fff;
        color: #000;
    }

    .add-worker-form input:focus,
    .add-worker-form select:focus {
        outline: none;
        border-color: #4CAF50;
        box-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
    }

    .add-worker-form button {
        width: 100%;
        padding: 10px 0;
        margin-top: 10px;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.3s;
    }

    .add-worker-form button:hover {
        background-color: #388e3c;
    }

    /* Login Form */
    .login-form {
        background: #fff;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        width: 320px;
    }

    .login-form input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #b3d9b3;
        border-radius: 5px;
        box-sizing: border-box;
        font-size: 14px;
    }

    .button-group {
        display: flex;
        gap: 10px;
        margin-top: 10px;
    }

    .button-group button,
    .button-group a.button-link {
        flex: 1;
        height: 40px;
        text-align: center;
        line-height: 20px;
        border-radius: 5px;
        font-size: 14px;
        text-decoration: none;
        color: white;
        cursor: pointer;
        transition: 0.3s;
        display: inline-block;
    }

    .button-group button {
        background: #4CAF50;
        border: none;
    }

    .button-group button:hover {
        background: #388e3c;
    }

    .button-group a.button-link {
        background: #888888;
        display: inline-flex;
        justify-content: center;
        align-items: center;
    }

    .button-group a.button-link:hover {
        background: #b2b0b0;
    }
</style>
</head>
<body>

<!-- Section 1: Add Worker -->
<section>
    <div class="add-worker-form">
        <h2>Add Worker</h2>
        <form action="/add-worker" method="POST">
            <input type="text" name="workerName" placeholder="Worker Name">
            <select name="workerClass">
                <option value="">Select Worker Class</option>
                <option value="Junior">Junior</option>
                <option value="Mid-Level">Mid-Level</option>
                <option value="Senior">Senior</option>
                <option value="Manager">Manager</option>
            </select>
            <input type="number" name="age" placeholder="Age">
            <input type="text" name="salary" placeholder="Salary">
            <button type="submit">Add Worker</button>
        </form>
    </div>
</section>

<!-- Section 2: Login Form -->
<section>
    <div class="login-form">
        <h2>Login</h2>
        <form action="/login" method="POST">
            <input id="email" type="email" name="email" placeholder="Email">
            <input id="password" type="password" name="password" placeholder="Password">
            <div class="button-group">
                <button onclick="sentData(event)" type="submit">Login</button>
                <a href="register.html" class="button-link">Register</a>
            </div>
        </form>
    </div>
</section>
<script>
    const sentData=async function(event){
       event.preventDefault();
       const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const res=await fetch('/login',{
            headers:{
                'accept':'application/json',
                'content-type':'application/json'
            },
            method:'post',
            body:JSON.stringify({email:email,password})
        })
        const data=await res.json()
       if(data.success){window.location.href='home.html'} else{alert(`The ${data.email} not found please register`)
           }}
</script>
</body>
</html>
